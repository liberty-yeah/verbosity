<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Flowchart Editor</title>
    <style>
        :root { --accent: #FF9999; --dark: #2f3640; --blue: #70a1ff; --sidebar-w: 250px; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; background: #f5f6fa; }
        #left-trigger { width: 15px; background: #dcdde1; height: 100vh; position: fixed; left: 0; z-index: 100; cursor: pointer; transition: 0.2s; }
        #left-trigger:hover { width: 25px; background: var(--accent); }
        #sidebar { position: fixed; left: -250px; top: 0; width: var(--sidebar-w); height: 100vh; background: var(--dark); color: white; transition: 0.3s; z-index: 101; padding: 20px; }
        #sidebar.active { left: 0; }
        #right-trigger { width: 30px; background: #FF9999; height: 100vh; position: fixed; right: 0; z-index: 100; cursor: pointer; opacity: 0.5; }
        #right-trigger:hover { opacity: 1; }
        #inspector { position: fixed; right: -600px; top: 0; width: 400px; min-width: 300px; max-width: 80vw; height: 100vh; background: white; border-left: 2px solid #dcdde1; transition: right 0.3s ease; z-index: 101; padding: 25px; overflow-y: auto; }
        #inspector.active { right: 0; }
        #resizer { width: 8px; height: 100%; position: absolute; left: 0; top: 0; cursor: ew-resize; background: transparent; }
        #workspace { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        #toolbar { padding: 15px; background: white; border-bottom: 1px solid #dcdde1; display: flex; justify-content: space-between; align-items: center; }
        #center-controls { display: flex; align-items: center; gap: 15px; }
        .toggle-btn { padding: 8px 16px; border-radius: 4px; border: 2px solid #dcdde1; background: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .toggle-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .toggle-btn.pending { background: #f1c40f !important; color: #2f3640 !important; border-color: #f1c40f !important; }
        #svg-container { flex-grow: 1; overflow: auto; background-image: radial-gradient(#d1d1d1 1px, transparent 1px); background-size: 25px 25px; min-height: 0; }
        #svg-container.placement-mode { cursor: crosshair; }
        svg { width: 4000px; height: 4000px; }
        .node-rect { fill: var(--blue); stroke: #2f3640; stroke-width: 2; cursor: grab; }
        .node-rect.selected { stroke: #FF9999; stroke-width: 4; }
        .node-rect.source-mode { fill: #e84118 !important; }
        .link-line { stroke: #718093; stroke-width: 2; fill: none; }
        .link-line.with-content { stroke: #0000FF; stroke-width: 4; }
        textarea { width: 100%; min-height: 80px; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; resize: vertical; }
        .content-block { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #f9f9f9; position: relative; }
        button { cursor: pointer; padding: 10px; border-radius: 4px; border: none; font-weight: bold; margin-bottom: 5px; }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-red { background: #e84118; color: white; width: 100%; }
        .btn-copy { background: #2f3640; color: white; width: 100%; margin-top: 10px; margin-bottom: 15px; font-size: 0.85em; }
        .close-btn { background: #2f3640; color: white; width: 100%; margin-bottom: 20px; }
        .connector-tag { background: #f1c40f; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

<div id="left-trigger" onmouseenter="toggleSidebar(true)"></div>
<div id="sidebar">
    <button class="close-btn" onclick="toggleSidebar(false)">Close Menu</button>
    <h3>Project Canvases</h3>
    <div id="canvas-list"></div>
    <button onclick="addCanvas()" style="width:100%; margin-top:20px;">+ New Canvas</button>
    <button onclick="exportJSON()" style="width:100%; background:#44bd32; color:white;">Export JSON</button>
</div>

<div id="workspace">
    <div id="toolbar">
        <strong id="current-canvas-name">Select a Canvas</strong>
        <div id="center-controls">
            <button class="toggle-btn" id="add-node-btn" onclick="enterNodePlacementMode()">+ Node</button>
            <button class="toggle-btn" id="link-mode-btn" onclick="toggleLinkMode()">🔗 Link</button>
            <span id="mode-indicator" style="color: #e84118; font-weight: bold;"></span>
        </div>
    </div>
    <div id="svg-container">
        <svg id="canvas-svg" onmousedown="handleSvgMouseDown(event)" onmousemove="handleMouseMove(event)" onmouseup="handleMouseUp(event)">
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#718093" />
                </marker>
            </defs>
            <g id="links-group"></g>
            <g id="nodes-group"></g>
        </svg>
    </div>
</div>

<div id="right-trigger" onmouseenter="toggleInspector(true)"></div>
<div id="inspector">
    <div id="resizer"></div>
    <button class="close-btn" onclick="toggleInspector(false)">Close Inspector</button>
    <div id="inspector-content" style="display:none">
        <h3 id="inspector-title">Settings</h3>
        <div id="id-display" style="font-size: 10px; color: #999; margin-bottom: 10px;"></div>
        
        <div id="node-editor" style="display:none">
            <button class="btn-copy" onclick="copyAddress('node')">📋 Copy Node Address</button>
            <label>Label</label>
            <input type="text" id="node-label-input" style="width:100%; padding:10px; margin-bottom:15px;" oninput="updateNodeLabel(this.value)">
            <button class="btn-blue" style="background:#f1c40f; color:#2f3640;" onclick="startBranching()">⚡ Add Branch</button>
            <hr style="margin:20px 0;">
            <h4>Documentation</h4>
            <div id="headings-container"></div>
            <button class="btn-blue" onclick="addHeadingBlock()">+ Add New Section</button>
            <button class="btn-red" onclick="deleteNode()">Delete Node</button>
        </div>

        <div id="link-editor" style="display:none">
            <button class="btn-copy" onclick="copyAddress('link')">📋 Copy Link Address</button>
            <label>Link Label</label>
            <input type="text" id="link-label-input" style="width:100%; padding:10px; margin-bottom:15px;" oninput="updateLinkLabel(this.value)">
            <h4>Documentation</h4>
            <div id="link-headings-container"></div>
            <button class="btn-blue" onclick="addLinkHeadingBlock()">+ Add New Section</button>
            <button class="btn-red" onclick="deleteLink()">Delete Link</button>
        </div>
    </div>
    <p id="inspector-placeholder" style="text-align:center; color:#999; margin-top:50px;">Select a node or link to edit.</p>
</div>

<script>
    let data = { canvases: [] };
    let currentCanvasIdx = -1;
    let selectedNodeId = null;
    let selectedLinkId = null;
    let isLinkMode = false;
    let isNodePlacementMode = false;
    let draggedNode = null;
    let offset = { x: 0, y: 0 };

    function toggleSidebar(show) { document.getElementById('sidebar').classList.toggle('active', show); }
    function toggleInspector(show) { document.getElementById('inspector').classList.toggle('active', show); }

    function enterNodePlacementMode() {
        if (currentCanvasIdx === -1) { alert("Select a canvas first"); return; }
        isNodePlacementMode = true;
        isLinkMode = false;
        document.getElementById('add-node-btn').classList.add('pending');
        document.getElementById('svg-container').classList.add('placement-mode');
        document.getElementById('mode-indicator').innerText = "PLACEMENT MODE: Click on canvas";
    }

    function toggleLinkMode() {
        isLinkMode = !isLinkMode;
        isNodePlacementMode = false;
        document.getElementById('add-node-btn').classList.remove('pending');
        document.getElementById('svg-container').classList.remove('placement-mode');
        document.getElementById('link-mode-btn').classList.toggle('active', isLinkMode);
        document.getElementById('mode-indicator').innerText = isLinkMode ? "CONNECTION MODE: Click target node" : "";
        if(!isLinkMode) selectedNodeId = null;
        renderCanvas();
    }

    function getSVGPoint(e) {
        const svg = document.getElementById('canvas-svg');
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        return pt.matrixTransform(svg.getScreenCTM().inverse());
    }

    function handleSvgMouseDown(e) {
        if (currentCanvasIdx === -1) return;
        if (isNodePlacementMode) {
            const pt = getSVGPoint(e);
            data.canvases[currentCanvasIdx].nodes.push({ id: 'n' + Date.now(), text: 'New Node', x: pt.x - 50, y: pt.y - 30, content: [] });
            isNodePlacementMode = false;
            document.getElementById('add-node-btn').classList.remove('pending');
            document.getElementById('svg-container').classList.remove('placement-mode');
            document.getElementById('mode-indicator').innerText = "";
            renderCanvas();
        }
    }

    function handleNodeMouseDown(e, id) {
        e.stopPropagation();
        if (isLinkMode) {
            if (!selectedNodeId) { selectedNodeId = id; renderCanvas(); }
            else if (selectedNodeId === id) { selectedNodeId = null; renderCanvas(); }
            else { completeBranch(id); }
            return;
        }
        const canvas = data.canvases[currentCanvasIdx];
        draggedNode = canvas.nodes.find(n => n.id === id);
        selectedNodeId = id;
        selectedLinkId = null;
        const pt = getSVGPoint(e);
        offset.x = pt.x - draggedNode.x;
        offset.y = pt.y - draggedNode.y;
        showNodeInspector(id);
        renderCanvas();
    }

    function handleLinkMouseDown(e, linkId) {
        e.stopPropagation();
        if (isLinkMode) return;
        selectedNodeId = null;
        selectedLinkId = linkId;
        showLinkInspector(linkId);
        renderCanvas();
    }

    function showNodeInspector(id) {
        const node = data.canvases[currentCanvasIdx].nodes.find(n => n.id === id);
        document.getElementById('inspector-placeholder').style.display = 'none';
        document.getElementById('inspector-content').style.display = 'block';
        document.getElementById('node-editor').style.display = 'block';
        document.getElementById('link-editor').style.display = 'none';
        document.getElementById('node-label-input').value = node.text;
        document.getElementById('id-display').innerText = `ID: ${id}`;
        toggleInspector(true);
        renderNodeHeadings();
    }

    function showLinkInspector(linkId) {
        const link = data.canvases[currentCanvasIdx].links.find(l => l.id === linkId);
        document.getElementById('inspector-placeholder').style.display = 'none';
        document.getElementById('inspector-content').style.display = 'block';
        document.getElementById('node-editor').style.display = 'none';
        document.getElementById('link-editor').style.display = 'block';
        document.getElementById('link-label-input').value = link.label || '';
        document.getElementById('id-display').innerText = `ID: ${linkId}`;
        toggleInspector(true);
        renderLinkHeadings();
    }

    function copyAddress(type) {
        const id = type === 'node' ? selectedNodeId : selectedLinkId;
        const addr = `${currentCanvasIdx}:${type}:${id}`;
        navigator.clipboard.writeText(addr);
        alert("Address copied to clipboard: " + addr);
    }

    function startBranching() { toggleLinkMode(); }

    function completeBranch(targetId) {
        const type = prompt("1: Forward, 2: Back, 3: Both, 4: None", "1");
        let linkType = type === "2" ? 'back' : type === "3" ? 'both' : type === "4" ? 'none' : 'forward';
        data.canvases[currentCanvasIdx].links.push({ id: 'l'+Date.now(), from: selectedNodeId, to: targetId, type: linkType, label: '', content: [] });
        toggleLinkMode();
    }

    function renderCanvas() {
        const nodesG = document.getElementById('nodes-group');
        const linksG = document.getElementById('links-group');
        const canvas = data.canvases[currentCanvasIdx];
        if (!canvas) return;
        nodesG.innerHTML = ''; linksG.innerHTML = '';
        document.getElementById('current-canvas-name').innerText = canvas.name;
        
        canvas.links.forEach(l => {
            const s = canvas.nodes.find(n => n.id === l.from);
            const t = canvas.nodes.find(n => n.id === l.to);
            if (!s || !t) return;
            const cx1 = s.x + 50; const cy1 = s.y + 30;
            const cx2 = t.x + 50; const cy2 = t.y + 30;
            const dx = cx2 - cx1; const dy = cy2 - cy1;
            let r = Math.min(Math.min(Math.abs(52 / dx), Math.abs(32 / dy)), 0.45);
            const x1 = cx1 + dx * r, y1 = cy1 + dy * r, x2 = cx2 - dx * r, y2 = cy2 - dy * r;

            const hitbox = document.createElementNS("http://www.w3.org/2000/svg", "line");
            hitbox.setAttribute("x1", x1); hitbox.setAttribute("y1", y1); hitbox.setAttribute("x2", x2); hitbox.setAttribute("y2", y2);
            hitbox.setAttribute("stroke", "transparent"); hitbox.setAttribute("stroke-width", "15");
            hitbox.onmousedown = (e) => handleLinkMouseDown(e, l.id);
            linksG.appendChild(hitbox);

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1); line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("class", `link-line ${l.content?.length > 0 ? 'with-content' : ''}`);
            line.style.pointerEvents = "none";
            if(l.type === 'forward' || l.type === 'both') line.setAttribute("marker-end", "url(#arrow)");
            if(l.type === 'back' || l.type === 'both') line.setAttribute("marker-start", "url(#arrow)");
            linksG.appendChild(line);
        });
        
        canvas.nodes.forEach(n => {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${n.x},${n.y})`);
            g.onmousedown = (e) => handleNodeMouseDown(e, n.id);
            const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            r.setAttribute("width", "100"); r.setAttribute("height", "60"); r.setAttribute("rx", "8");
            r.setAttribute("class", `node-rect ${n.id === selectedNodeId ? (isLinkMode ? 'source-mode' : 'selected') : ''}`);
            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.setAttribute("x", "50"); t.setAttribute("y", "35"); t.setAttribute("text-anchor", "middle");
            t.setAttribute("fill", "white"); t.style.fontSize = "12px"; t.style.pointerEvents = "none";
            t.textContent = n.text;
            g.appendChild(r); g.appendChild(t); nodesG.appendChild(g);
        });
    }

    function handleMouseMove(e) {
        if (draggedNode) {
            const pt = getSVGPoint(e);
            draggedNode.x = pt.x - offset.x; draggedNode.y = pt.y - offset.y;
            renderCanvas();
        }
    }
    function handleMouseUp() { draggedNode = null; }

    function addCanvas() {
        const name = prompt("Canvas Name:");
        if (!name) return;
        data.canvases.push({ name, nodes: [], links: [] });
        currentCanvasIdx = data.canvases.length - 1;
        renderSidebar(); renderCanvas(); toggleSidebar(false);
    }

    function renderSidebar() {
        const list = document.getElementById('canvas-list');
        list.innerHTML = '';
        data.canvases.forEach((c, i) => {
            const div = document.createElement('div');
            div.style.padding = "10px"; div.style.background = "#353b48"; div.style.margin = "5px 0"; div.style.cursor = "pointer";
            div.innerText = c.name;
            div.onclick = () => { currentCanvasIdx = i; renderSidebar(); renderCanvas(); toggleSidebar(false); };
            if(i === currentCanvasIdx) div.style.borderLeft = "4px solid var(--accent)";
            list.appendChild(div);
        });
    }

    function updateNodeLabel(v) { data.canvases[currentCanvasIdx].nodes.find(n => n.id === selectedNodeId).text = v; renderCanvas(); }
    function updateLinkLabel(v) { data.canvases[currentCanvasIdx].links.find(l => l.id === selectedLinkId).label = v; }
    function updateNC(idx, f, v) { data.canvases[currentCanvasIdx].nodes.find(n => n.id === selectedNodeId).content[idx][f] = v; }
    function updateLC(idx, f, v) { data.canvases[currentCanvasIdx].links.find(l => l.id === selectedLinkId).content[idx][f] = v; }
    
    function addHeadingBlock() { data.canvases[currentCanvasIdx].nodes.find(n => n.id === selectedNodeId).content.push({h:'Heading', t:'', isConnector: false}); renderNodeHeadings(); }
    function addLinkHeadingBlock() { data.canvases[currentCanvasIdx].links.find(l => l.id === selectedLinkId).content.push({h:'Heading', t:'', isConnector: false}); renderLinkHeadings(); }
    function removeNodeHeading(idx) { data.canvases[currentCanvasIdx].nodes.find(n => n.id === selectedNodeId).content.splice(idx,1); renderNodeHeadings(); }
    function removeLinkHeading(idx) { data.canvases[currentCanvasIdx].links.find(l => l.id === selectedLinkId).content.splice(idx,1); renderLinkHeadings(); }

    function renderNodeHeadings() {
        const container = document.getElementById('headings-container'); container.innerHTML = '';
        const node = data.canvases[currentCanvasIdx].nodes.find(n => n.id === selectedNodeId);
        node.content.forEach((block, idx) => {
            const div = document.createElement('div'); div.className = 'content-block';
            div.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
                    <input type="text" value="${block.h}" oninput="updateNC(${idx},'h',this.value)" style="width:65%;">
                    <label style="font-size:10px;"><input type="checkbox" ${block.isConnector?'checked':''} onchange="updateNC(${idx},'isConnector',this.checked); renderNodeHeadings()"> 🔗 Link</label>
                </div>
                <textarea oninput="updateNC(${idx},'t',this.value)" placeholder="${block.isConnector?'Paste Address Here...':''}">${block.t}</textarea>
                <button onclick="removeNodeHeading(${idx})" style="color:red; background:none; font-size:10px;">Remove</button>`;
            container.appendChild(div);
        });
    }

    function renderLinkHeadings() {
        const container = document.getElementById('link-headings-container'); container.innerHTML = '';
        const link = data.canvases[currentCanvasIdx].links.find(l => l.id === selectedLinkId);
        if (!link.content) link.content = [];
        link.content.forEach((block, idx) => {
            const div = document.createElement('div'); div.className = 'content-block';
            div.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:5px;">
                    <input type="text" value="${block.h}" oninput="updateLC(${idx},'h',this.value)" style="width:65%;">
                    <label style="font-size:10px;"><input type="checkbox" ${block.isConnector?'checked':''} onchange="updateLC(${idx},'isConnector',this.checked); renderLinkHeadings()"> 🔗 Link</label>
                </div>
                <textarea oninput="updateLC(${idx},'t',this.value)" placeholder="${block.isConnector?'Paste Address Here...':''}">${block.t}</textarea>
                <button onclick="removeLinkHeading(${idx})" style="color:red; background:none; font-size:10px;">Remove</button>`;
            container.appendChild(div);
        });
    }

    function deleteNode() {
        const c = data.canvases[currentCanvasIdx];
        c.nodes = c.nodes.filter(n => n.id !== selectedNodeId);
        c.links = c.links.filter(l => l.from !== selectedNodeId && l.to !== selectedNodeId);
        selectedNodeId = null; toggleInspector(false); renderCanvas();
    }
    function deleteLink() {
        const c = data.canvases[currentCanvasIdx];
        c.links = c.links.filter(l => l.id !== selectedLinkId);
        selectedLinkId = null; toggleInspector(false); renderCanvas();
    }
    function exportJSON() {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'flow_project.json'; a.click();
    }
    
    // Resizer logic
    const resizer = document.getElementById('resizer');
    resizer.addEventListener('mousedown', () => {
        const doResize = (e) => {
            let w = window.innerWidth - e.clientX;
            if(w > 250) document.getElementById('inspector').style.width = w + 'px';
        };
        document.addEventListener('mousemove', doResize);
        document.addEventListener('mouseup', () => document.removeEventListener('mousemove', doResize));
    });

    window.addEventListener('keydown', (e) => {
        if(e.key === "Escape") { isNodePlacementMode = isLinkMode = false; document.getElementById('add-node-btn').classList.remove('pending'); document.getElementById('link-mode-btn').classList.remove('active'); document.getElementById('mode-indicator').innerText = ""; renderCanvas(); }
    });
</script>
</body>
</html>
